services:
  postgres:
    image: postgres:15-alpine
    container_name: bigdata_postgres
    environment:
      POSTGRES_DB: bigdata_snowflake
      POSTGRES_USER: bigdata_user
      POSTGRES_PASSWORD: bigdata_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_scripts:/docker-entrypoint-initdb.d
      - ./исходные данные:/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bigdata_user -d bigdata_snowflake"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
